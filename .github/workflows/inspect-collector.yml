name: inspect collector failure

on:
  push:
    branches: [main]
    paths:
      - ".inspect/**"

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Read marker, fetch log tail, and publish diagnostic
        shell: bash
        run: |
          set -euo pipefail
          marker="$(find .inspect -maxdepth 1 -type f -name '*.txt' -printf '%T@ %p\n' | sort -nr | head -1 | cut -d' ' -f2-)"
          test -n "$marker"
          run_id="$(sed -n 's/^run_id=//p' "$marker" | tail -1)"
          job_id="$(sed -n 's/^job_id=//p' "$marker" | tail -1)"
          test -n "$run_id"
          test -n "$job_id"
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > full.log
          tail -n 300 full.log > tail.log
          path="diagnostics/collector-${run_id}-tail.log"
          encoded="$(base64 -w0 tail.log)"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message="save collector ${run_id} diagnostic tail" \
            -f content="$encoded" \
            -f branch=main
      - uses: actions/upload-artifact@v4
        with:
          name: collector-failure-tail-${{ github.run_id }}
          path: tail.log
          if-no-files-found: error
          retention-days: 3
